<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pronunciation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('fondo de pantalla frase lineas azul.png');
      background-size: cover;
      background-position: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      width: 600px;
      max-height: 70vh;
      overflow-y: scroll;
      padding: 8px 24px;
    }
    .card::-webkit-scrollbar { display: none; }
    .card { -ms-overflow-style: none; scrollbar-width: none; }

    .word-entry {
      padding: 16px 0;
      border-bottom: 1px solid rgba(100, 140, 180, 0.2);
    }
    .word-entry:last-child { border-bottom: none; }

    /* Definition line */
    .word-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
    }

    /* Example block */
    .word-example {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 0 4px;
    }
    .example-audio-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .example-sentence {
      font-size: 15px;
      color: #1a3a55;
      text-align: center;
    }
    .example-sentence strong { font-weight: 700; color: #0f2a40; }
    .example-translation {
      font-size: 14px;
      font-style: italic;
      color: #4a6a85;
      text-align: center;
    }

    /* Shared button style */
    .play-btn {
      flex-shrink: 0;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid rgba(80, 120, 170, 0.5);
      background: rgba(255, 255, 255, 0.7);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #3a6080;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }
    .play-btn:hover { background: rgba(200, 220, 240, 0.8); border-color: #5a90bb; }
    .play-btn.playing {
      background: rgba(180, 210, 240, 0.9);
      border-color: #3a7ab0;
      color: #1a4a70;
    }

    .word-text {
      font-size: 15px;
      color: #1a3a55;
      line-height: 1.55;
    }
    .word-text strong { font-weight: 700; color: #0f2a40; }

    .def-btn { margin-top: 2px; }
  </style>
</head>
<body>

<div class="card">
  <div id="wordList"></div>
</div>

<script>
  const words = [
    {
      word: "Carrots",
      def: 'Como sustantivo plural de <strong>carrot</strong>, vegetal de color naranja, largo y con forma cónica, que crece bajo la tierra y se consume como alimento <em>(zanahoria)</em>.',
      example: 'She added <strong>carrots</strong> to the soup.',
      translation: '(Ella le agregó zanahorias a la sopa.)',
      exampleFile: 'carrots_example'
    },
    {
      word: "Minutes",
      def: 'Plural de <strong>minute</strong>. Unidad de tiempo equivalente a 60 segundos <em>(minutos)</em>.',
      example: 'Wait five <strong>minutes</strong>, please.',
      translation: '(Espera cinco minutos, por favor.)',
      exampleFile: 'minutes_example'
    },
    {
      word: "Hours",
      def: 'Plural de <strong>hour</strong>. Unidad de tiempo equivalente a 60 minutos <em>(horas)</em>.',
      example: 'The flight takes three <strong>hours</strong>.',
      translation: '(El vuelo dura tres horas.)',
      exampleFile: 'hours_example'
    }
  ];

  let currentAudio = null;
  let currentBtn   = null;

  function makePlayBtn(audioSrc, label) {
    const btn = document.createElement("button");
    btn.className = "play-btn";
    btn.setAttribute("aria-label", label);
    btn.innerHTML = '<i class="ti ti-player-play"></i>';

    btn.addEventListener("click", () => {
      if (currentAudio && !currentAudio.paused) {
        currentAudio.pause();
        if (currentBtn) {
          currentBtn.innerHTML = '<i class="ti ti-player-play"></i>';
          currentBtn.classList.remove("playing");
        }
        if (currentBtn === btn) { currentAudio = null; currentBtn = null; return; }
      }

      const audio = new Audio(audioSrc);
      currentAudio = audio;
      currentBtn   = btn;

      btn.innerHTML = '<i class="ti ti-player-pause"></i>';
      btn.classList.add("playing");

      audio.play().catch(() => {
        btn.innerHTML = '<i class="ti ti-player-play"></i>';
        btn.classList.remove("playing");
      });

      audio.addEventListener("ended", () => {
        btn.innerHTML = '<i class="ti ti-player-play"></i>';
        btn.classList.remove("playing");
        currentAudio = null;
        currentBtn   = null;
      });
    });

    return btn;
  }

  words.forEach(w => {
    const entry = document.createElement("div");
    entry.className = "word-entry";

    // Definition line
    const defBtn = makePlayBtn(`audio/${w.word.toLowerCase()}.mp3`, "Reproducir " + w.word);
    defBtn.classList.add("def-btn");

    const text = document.createElement("p");
    text.className = "word-text";
    text.innerHTML = `<strong>${w.word}:</strong> ${w.def}`;

    const wordLine = document.createElement("div");
    wordLine.className = "word-line";
    wordLine.appendChild(defBtn);
    wordLine.appendChild(text);

    // Example block
    const exampleBtn = makePlayBtn(`audio/${w.exampleFile}.mp3`, "Reproducir ejemplo");

    const sentence = document.createElement("p");
    sentence.className = "example-sentence";
    sentence.innerHTML = w.example;

    const audioRow = document.createElement("div");
    audioRow.className = "example-audio-row";
    audioRow.appendChild(exampleBtn);
    audioRow.appendChild(sentence);

    const translation = document.createElement("p");
    translation.className = "example-translation";
    translation.textContent = w.translation;

    const exBlock = document.createElement("div");
    exBlock.className = "word-example";
    exBlock.appendChild(audioRow);
    exBlock.appendChild(translation);

    entry.appendChild(wordLine);
    entry.appendChild(exBlock);
    document.getElementById("wordList").appendChild(entry);
  });
</script>
</body>
</html>
