<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pronunciation</title>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 40px;
    background-color: #f5f5f5;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
  }

  #wordList {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
  }

  .word-btn {
    font-size: 20px;
    background-color: white;
    border: 2px solid black;
    border-radius: 5px;
    cursor: pointer;
    padding: 10px 15px;
    text-align: center;
  }

  .word-btn.active {
    border: 2px solid red;
  }

  .word-btn:hover {
    background-color: #f0f0f0;
  }

  .word-btn:active {
    transform: scale(0.97);
  }
</style>
</head>

<body>

<div id="wordList"></div>

<script>
const words = 
[
  "Aa", "Bb", "Cc", "Dd", "Ee", "Ff", "Gg", "Hh", "Ii", "Jj", "Kk", "Ll", "Mm", "Nn", "Oo", "Pp", "Qq", "Rr", "Ss", "Tt", "Uu",
  "Vv", "Ww", "Xx", "Yy", "Zz", "you", "one", "minute", "first", "he", "ones", "minutes", "firsts", "she", "two", "minuted", "second",
  "it", "twos", "minuting", "seconds", "we", "three", "hour", "seconded", "they", "threes", "hours", "seconding", "me", "four", "dawn",
  "third"
];

const container = document.getElementById("wordList");
let activeButton = null;
let audioPlayer = new Audio(); // ✅ UN solo reproductor

// 🔹 prioridad: URL > localStorage
const params = new URLSearchParams(window.location.search);
const savedWord = params.get("word") || localStorage.getItem("lastWord");

words.forEach(word => {
  const btn = document.createElement("button");
  btn.className = "word-btn";
  btn.textContent = word;

  // 🔴 marcar última palabra
  if (word === savedWord) {
    btn.classList.add("active");
    activeButton = btn;

    setTimeout(() => {
      btn.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 100);
  }

  btn.onclick = () => {
    if (activeButton) {
      activeButton.classList.remove("active");
    }

    btn.classList.add("active");
    activeButton = btn;

    // 💾 guardar progreso
    localStorage.setItem("lastWord", word);

    // 🔗 actualizar URL
    history.replaceState(null, "", "?word=" + word);

// 🔊 reproducir audio - VERSIÓN MEJORADA
audioPlayer.pause();
audioPlayer.src = "";           // 👈 libera el stream anterior completamente
audioPlayer.load();             // 👈 resetea el elemento de audio
audioPlayer.src = `audio/${word}.mp3`;
audioPlayer.load();             // 👈 precarga el nuevo archivo
audioPlayer.play().catch(() => {
  alert(`No se encontró el audio: audio/${word}.mp3`);
});
};

  container.appendChild(btn);
});
</script>

</body>
</html>
