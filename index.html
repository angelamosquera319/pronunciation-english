<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vocabulario</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('fondo de pantalla frase lineas azul.png');
      background-size: cover;
      background-position: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      width: min(750px, 90vw); /* ANCHO DE LA TARJETA */
      max-height: 80vh;
      overflow-y: scroll;
      padding: 8px 24px;
    }
    .card::-webkit-scrollbar { display: none; }
    .card { -ms-overflow-style: none; scrollbar-width: none; }

    .word-entry {
      padding: 1px 0;
    }
    .word-entry:last-child { border-bottom: none; }

    .word-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
    }

    .word-text {
      font-size: 18px; /* TAMAÑO LETRA PALABRA */
      color: #1a3a55;
      line-height: 1.55;
      margin-right: 8px;
    }
    .word-text strong { font-weight: 700; color: #0f2a40; }

    .def-block {
      margin-bottom: 12px;
    }
    .def-block:last-child { margin-bottom: 0; }

    .def-text {
      font-size: 17px; /* TAMAÑO LETRA DEFINICIÓN */
      color: #1a3a55;
      line-height: 1.55;
      margin-bottom: 8px;
      margin-left: 38px;
      margin-right: 38px;
    }
    .def-text strong { font-weight: 700; color: #0f2a40; }

    .word-example {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 0 2px;
    }
    .example-sentence {
      font-size: 17px; /* TAMAÑO LETRA EJEMPLO */
      color: #1a3a55;
      text-align: center;
    }
    .example-sentence strong { font-weight: 700; color: #0f2a40; }
    .example-translation {
      font-size: 16px; /* TAMAÑO LETRA TRADUCCIÓN */
      font-style: italic;
      color: #4a6a85;
      text-align: center;
    }

    .def-divider {
      border: none;
      border-top: 1px dashed rgba(100, 140, 180, 0.3);
      margin: 12px 0;
    }

    .play-btn {
      flex-shrink: 0;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid rgba(80, 120, 170, 0.5);
      background: rgba(255, 255, 255, 0.7);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #3a6080;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }
    .play-btn:hover { background: rgba(200, 220, 240, 0.8); border-color: #5a90bb; }
    .play-btn.playing {
      background: rgba(180, 210, 240, 0.9);
      border-color: #3a7ab0;
      color: #1a4a70;
    }
    .def-btn { margin-top: 1px; }
  </style>
</head>
<body>

<div class="card" id="card">
  <div id="wordList"></div>
</div>

<script>
  const words = [
  {
      word: "A",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la primera letra del alfabeto.',
          example: 'The word "apple" starts with an A.',

        }

  },
  {
      word: "B",
      definitions: [

   },

      ]
   },
  {

   },
   {

      definitions: [

        }

    },
    {

      definitions: [

        }
      ]
     },
    {

      definitions: [
        {

          example: 'The word "garden" starts with a G.',
          translation: 'La palabra "garden" comienza con una G.'
        }
      ]
     },
    {
      word: "H",
      definitions: [
        {

          example: 'The word "house" starts with an H.',
          translation: 'La palabra "house" comienza con una H.'
        }

      definitions: [

          def: 'Como sustantivo, se refiere a la novena letra del alfabeto.',
          example: 'The word "island" starts with an I.',
          translation: 'La palabra "island" comienza con una I.'
        }
      ]
     },
    {
      word: "J",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la décima letra del alfabeto.',
          example: 'The word "jungle" starts with a J.',
          translation: 'La palabra "jungle" comienza con una J.'
        }
      ]
     },
    {
      word: "K",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la undécima letra del alfabeto.',
          example: 'The word "king" starts with a K.',
          translation: 'La palabra "king" comienza con una K.'
        }
      ]
     },
    {
      word: "L",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la duodécima letra del alfabeto.',
          example: 'The word "lion" starts with an L.',
          translation: 'La palabra "lion" comienza con una L.'
        }

     },
    {

      definitions: [
        {
          def: 'Como sustantivo, se refiere a la decimotercera letra del alfabeto latino.',
          example: 'The word "moon" starts with a M.',

        }
      ]
     },
    {

      definitions: [

          def: 'Como sustantivo, se refiere a la decimocuarta letra del alfabeto.',
          example: 'The word "night" starts with a N.',
          translation: 'La palabra "night" comienza con una N.'
        }
      ]
     },
    {
      word: "O",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la decimoquinta letra del alfabeto.',
          example: 'The word "ocean" starts with an O.',
          translation: 'La palabra "ocean" comienza con una O.'
        }
      ]
     },
    {
      word: "P",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la decimosexta letra del alfabeto.',
          example: 'The word "penguin" starts with a P.',
          translation: 'La palabra "penguin" comienza con una P.'
        }
      ]
     },
    {
      word: "Q",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la decimoséptima letra del alfabeto.',
          example: 'The word "queen" starts with a Q.',
          translation: 'La palabra "queen" comienza con una Q.'
        }
      ]
     },
    {
      word: "R",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la decimoctava letra del alfabeto.',
          example: 'The word "river" starts with a R.',
          translation: 'La palabra "river" comienza con una R.'
        }
      ]
     },
    {
      word: "S",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la decimonovena letra del alfabeto.',
          example: 'The word "sun" starts with a S.',
          translation: 'La palabra "sun" comienza con una S.'
        }
      ]
     },
    {
      word: "T",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la vigésima letra del alfabeto.',
          example: 'The word "tree" starts with a T.',
          translation: 'La palabra "tree" comienza con una T.'
        }
      ]
     },
    {
      word: "U",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la vigésima primera letra del alfabeto.',
          example: 'The word "umbrella" starts with a U.',
          translation: 'La palabra "umbrella" comienza con una U.'
        }
      ]
     },
    {
      word: "V",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la vigésima segunda letra del alfabeto.',
          example: 'The word "volcano" starts with a V.',
          translation: 'La palabra "volcano" comienza con una V.'
        }
      ]
     },
    {
      word: "W",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la vigésima tercera letra del alfabeto.',
          example: 'The word "water" starts with a W.',
          translation: 'La palabra "water" comienza con una W.'
        }
      ]
     },
    {
      word: "X",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la vigésima cuarta letra del alfabeto.',
          example: 'The word "xylophone" starts with an X.',
          translation: 'La palabra "xylophone" comienza con una X.'
        }
      ]
     },
    {
      word: "Y",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la vigésima quinta letra del alfabeto.',
          example: 'The word "yellow" starts with a Y.',
          translation: 'La palabra "yellow" comienza con una Y.'
        }
      ]
     },
    {
      word: "Z",
      definitions: [
        {
          def: 'Como sustantivo, se refiere a la vigésima sexta letra del alfabeto.',
          example: 'The word "zebra" starts with a Z.',
          translation: 'La palabra "zebra" comienza con una Z.'
        }
      ]
     },



   {
      word: "Carrots",
      definitions: [
        {
          def: 'Como sustantivo plural de <strong>carrot</strong>, vegetal de color naranja, largo y con forma cónica, que crece bajo la tierra y se consume como alimento <em>(zanahoria)</em>.',
          example: 'She added <strong>carrots</strong> to the soup.',
          translation: 'Ella le agregó zanahorias a la sopa.'
        }
      ]
    },
    {
      word: "Lay",
      definitions: [
        {
          def: 'Como verbo en pasado simple de <strong>to lay</strong> <em>(poner, colocar)</em>, se refiere a la acción de haber puesto o colocado algo sobre una superficie de manera cuidadosa o deliberada, y sus traducciones son <em>puso, colocó</em>.',
          example: 'She <strong>lay</strong> the book on the table.',
          translation: 'Ella colocó el libro sobre la mesa.'
        },
        {
          def: 'Y como pasado simple de <strong>to lie</strong> <em>(yacer, acostarse)</em>, se refiere a la acción de haberse recostado o permanecido en posición horizontal sobre una superficie, y sus traducciones son <em>yació, se acostó</em>.',
          example: 'He <strong>lay</strong> on the bed all afternoon.',
          translation: 'Él estuvo acostado en la cama toda la tarde.'
        }
      ]
    }
  ];

  const card = document.getElementById("card");
  const savedWord = new URLSearchParams(window.location.search).get("word");

  let currentAudio = null;
  let currentBtn   = null;

  function makePlayBtn(audioSrc, label, wordKey) {
    const btn = document.createElement("button");
    btn.className = "play-btn";
    btn.setAttribute("aria-label", label);
    btn.innerHTML = '<i class="ti ti-player-play"></i>';

    btn.addEventListener("click", () => {
      if (currentAudio && !currentAudio.paused) {
        currentAudio.pause();
        if (currentBtn) {
          currentBtn.innerHTML = '<i class="ti ti-player-play"></i>';
          currentBtn.classList.remove("playing");
        }
        if (currentBtn === btn) { currentAudio = null; currentBtn = null; return; }
      }

      const audio = new Audio(audioSrc);
      currentAudio = audio;
      currentBtn   = btn;

      btn.innerHTML = '<i class="ti ti-player-pause"></i>';
      btn.classList.add("playing");

      if (wordKey) history.replaceState(null, "", `?word=${wordKey}`);

      audio.play().catch(() => {
        btn.innerHTML = '<i class="ti ti-player-play"></i>';
        btn.classList.remove("playing");
      });

      audio.addEventListener("ended", () => {
        btn.innerHTML = '<i class="ti ti-player-play"></i>';
        btn.classList.remove("playing");
        currentAudio = null;
        currentBtn   = null;
      });
    });

    return btn;
  }

  words.forEach(w => {
    const entry = document.createElement("div");
    entry.className = "word-entry";
    entry.dataset.word = w.word;

    // Word title + audio button (primera definición junto a la palabra, separada por ":")
    const defBtn = makePlayBtn(`audio/${w.word}.mp3`, "Reproducir " + w.word, w.word);
    defBtn.classList.add("def-btn");

    const wordTitle = document.createElement("p");
    wordTitle.className = "word-text";
    wordTitle.innerHTML = `<strong>${w.word}:</strong> ${w.definitions[0].def}`;

    const wordLine = document.createElement("div");
    wordLine.className = "word-line";
    wordLine.appendChild(defBtn);
    wordLine.appendChild(wordTitle);
    entry.appendChild(wordLine);

    // Ejemplo de la primera definición
    const firstExample = document.createElement("p");
    firstExample.className = "example-sentence";
    firstExample.innerHTML = w.definitions[0].example;

    const firstTranslation = document.createElement("p");
    firstTranslation.className = "example-translation";
    firstTranslation.textContent = w.definitions[0].translation;

    const firstExBlock = document.createElement("div");
    firstExBlock.className = "word-example";
    firstExBlock.appendChild(firstExample);
    firstExBlock.appendChild(firstTranslation);
    entry.appendChild(firstExBlock);

    // Definiciones adicionales (2da en adelante)
    w.definitions.forEach((d, i) => {
      if (i === 0) return; // la primera ya se mostró arriba

      const divider = document.createElement("hr");
      divider.className = "def-divider";
      entry.appendChild(divider);

      const defBlock = document.createElement("div");
      defBlock.className = "def-block";

      const defText = document.createElement("p");
      defText.className = "def-text";
      defText.innerHTML = d.def;
      defBlock.appendChild(defText);

      const sentence = document.createElement("p");
      sentence.className = "example-sentence";
      sentence.innerHTML = d.example;

      const translation = document.createElement("p");
      translation.className = "example-translation";
      translation.textContent = d.translation;

      const exBlock = document.createElement("div");
      exBlock.className = "word-example";
      exBlock.appendChild(sentence);
      exBlock.appendChild(translation);

      defBlock.appendChild(exBlock);
      entry.appendChild(defBlock);
    });

    document.getElementById("wordList").appendChild(entry);
  });

  if (savedWord) {
    const target = document.querySelector(`.word-entry[data-word="${savedWord}"]`);
    if (target) setTimeout(() => {
      card.scrollTo({ top: target.offsetTop - card.offsetTop - 16, behavior: "smooth" });
    }, 100);
  }
</script>
</body>
</html>
