<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pronunciation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background-image: url('fondo de pantalla frase lineas azul.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      padding: 40px 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      max-width: 680px;
      margin: 0 auto;
      padding: 8px 24px;
    }

    .word-entry {
      padding: 16px 0;
      border-bottom: 1px solid rgba(100, 140, 180, 0.2);
    }
    .word-entry:last-child { border-bottom: none; }

    .word-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .play-btn {
      flex-shrink: 0;
      margin-top: 2px;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid rgba(80, 120, 170, 0.5);
      background: rgba(255, 255, 255, 0.7);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #3a6080;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }
    .play-btn:hover { background: rgba(200, 220, 240, 0.8); border-color: #5a90bb; }
    .play-btn.playing {
      background: rgba(180, 210, 240, 0.9);
      border-color: #3a7ab0;
      color: #1a4a70;
    }

    .word-text {
      font-size: 15px;
      color: #1a3a55;
      line-height: 1.55;
    }
    .word-text strong { font-weight: 700; color: #0f2a40; }

    .word-example {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 13px;
      color: #3a5a75;
      margin-left: 38px;
    }
    .word-example i { font-size: 13px; flex-shrink: 0; margin-top: 2px; }
    .word-example p { font-style: italic; line-height: 1.5; }
    .word-example em { font-style: normal; color: #6a90aa; }
  </style>
</head>
<body>

<div class="card">
  <div id="wordList"></div>
</div>

<script>
  const words = [
    {
      word: "Carrots",
      def: 'Como sustantivo plural de <strong>carrot</strong>, vegetal de color naranja, largo y con forma cónica, que crece bajo la tierra y se consume como alimento <em>(zanahoria)</em>.',
      example: '"She added <strong>carrots</strong> to the soup."',
      translation: '(Ella le agregó zanahorias a la sopa.)'
    },
    {
      word: "Minutes",
      def: 'Plural de <strong>minute</strong>. Unidad de tiempo equivalente a 60 segundos <em>(minutos)</em>.',
      example: '"Wait five <strong>minutes</strong>, please."',
      translation: '(Espera cinco minutos, por favor.)'
    },
    {
      word: "Hours",
      def: 'Plural de <strong>hour</strong>. Unidad de tiempo equivalente a 60 minutos <em>(horas)</em>.',
      example: '"The flight takes three <strong>hours</strong>."',
      translation: '(El vuelo dura tres horas.)'
    }
  ];

  let currentAudio = null;
  let currentBtn   = null;

  words.forEach(w => {
    const entry = document.createElement("div");
    entry.className = "word-entry";

    const btn = document.createElement("button");
    btn.className = "play-btn";
    btn.setAttribute("aria-label", "Reproducir " + w.word);
    btn.innerHTML = '<i class="ti ti-player-play"></i>';

    btn.addEventListener("click", () => {
      if (currentAudio && !currentAudio.paused) {
        currentAudio.pause();
        if (currentBtn) {
          currentBtn.innerHTML = '<i class="ti ti-player-play"></i>';
          currentBtn.classList.remove("playing");
        }
        if (currentBtn === btn) { currentAudio = null; currentBtn = null; return; }
      }

      const audio = new Audio(`audio/${w.word.toLowerCase()}.mp3`);
      currentAudio = audio;
      currentBtn   = btn;

      btn.innerHTML = '<i class="ti ti-player-pause"></i>';
      btn.classList.add("playing");

      audio.play().catch(() => {
        btn.innerHTML = '<i class="ti ti-player-play"></i>';
        btn.classList.remove("playing");
      });

      audio.addEventListener("ended", () => {
        btn.innerHTML = '<i class="ti ti-player-play"></i>';
        btn.classList.remove("playing");
        currentAudio = null;
        currentBtn   = null;
      });
    });

    const line = document.createElement("div");
    line.className = "word-line";
    line.appendChild(btn);

    const text = document.createElement("p");
    text.className = "word-text";
    text.innerHTML = `<strong>${w.word}:</strong> ${w.def}`;
    line.appendChild(text);

    const ex = document.createElement("div");
    ex.className = "word-example";
    ex.innerHTML = `<i class="ti ti-music"></i><p>${w.example} <em>${w.translation}</em></p>`;

    entry.appendChild(line);
    entry.appendChild(ex);
    document.getElementById("wordList").appendChild(entry);
  });
</script>
</body>
</html>
